services:
  - type: web
    name: hiremind-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: DEMO_MODE
        value: "true"
      - key: LANGCHAIN_TRACING_V2
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.9"
